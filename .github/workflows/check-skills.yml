name: Check skills

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 .github/scripts/check_skills.py
